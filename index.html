      body {

      .contrast-more {

        --tw-text-opacity: 1 !important;
        --tw-border-opacity: 1 !important;
      }
      
      button, a {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Accessibility: Screen Reader Only */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      
      /* Accessibility: Focus Visible Global */
      :focus-visible {
        outline: 2px solid #06b6d4;
        outline-offset: 2px;
      }
      
      /* Accessibility: Reduced Motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
      
      /* Accessibility: High Contrast Text Enhancement */
      @media (prefers-contrast: more) {
        body {
          --tw-text-opacity: 1;
        }
        .text-slate-400, .text-slate-500 {
          color: #cbd5e1 !important;
        }
      }
      
      /* UI/UX: WCAG 2.2 AA Touch Targets (≥48px) */
      .touch-target-min {
        min-width: 48px;
        min-height: 48px;
      }
      
      /* UI/UX: Better Contrast for Secondary Text */
      .text-muted {
        color: #94a3b8; /* slate-400 - 4.6:1 ratio on #020617 */
      }
      
      .text-muted-strong {
        color: #cbd5e1; /* slate-300 - 8.9:1 ratio on #020617 */
      }
      
      /* UI/UX: Smooth Transitions with Reduced Motion Awareness */
      .transition-smooth {
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      .transition-spring {
        transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      
      .transition-ease-out-expo {
        transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      }
      
      @media (prefers-reduced-motion: reduce) {
        .transition-smooth, .transition-spring, .transition-ease-out-expo {
          transition: none;
        }
      }
      
      /* Glassmorphism Layers */
      .glass-panel {
        background: rgba(15, 23, 42, 0.55);
        backdrop-filter: blur(24px) saturate(1.8);
        -webkit-backdrop-filter: blur(24px) saturate(1.8);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      
      .glass-panel-elevated {
        background: rgba(15, 23, 42, 0.65);
        backdrop-filter: blur(40px) saturate(2);
        -webkit-backdrop-filter: blur(40px) saturate(2);
        border: 1px solid rgba(255, 255, 255, 0.12);

      }

      .glass-panel-subtle {
        background: rgba(15, 23, 42, 0.35);
        backdrop-filter: blur(16px) saturate(1.5);
        -webkit-backdrop-filter: blur(16px) saturate(1.5);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* GPU-accelerated glassmorphism for mobile */
      @supports (backdrop-filter: blur(1px)) {
        .glass-panel, .glass-panel-elevated, .glass-panel-subtle {
          will-change: backdrop-filter;
          transform: translateZ(0);
        }
      }
      /* Fallback for browsers without backdrop-filter */
      @supports not (backdrop-filter: blur(1px)) {
        .glass-panel { background: rgba(15, 23, 42, 0.92); }
        .glass-panel-elevated { background: rgba(15, 23, 42, 0.95); }
        .glass-panel-subtle { background: rgba(15, 23, 42, 0.85); }
      }
      
      /* Gradient Borders */

      .glow-line {

        background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.5), transparent);
      }
      
      .glow-line-vertical {
        width: 1px;
        background: linear-gradient(180deg, transparent, rgba(6, 182, 212, 0.3), transparent);
      }
      
      /* Hover Lift Effect */
      .hover-lift {
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
      }

      .stagger-4 { animation-delay: 200ms; }

      .stagger-7 { animation-delay: 350ms; }
      .stagger-8 { animation-delay: 400ms; }
      
      /* UI/UX: Loading Shimmer Effect */
      .shimmer-loading {
        background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
        background-size: 400% 100%;
        animation: shimmer 2s ease-in-out infinite;
      }
      
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      @media (prefers-reduced-motion: reduce) {
        .shimmer-loading {
          animation: none;
          background: #1e293b;
        }
      }
      
      /* UI/UX: PWA Splash Feedback */
      .pwa-loading {

      }
      
      /* Animated gradient text */
      .text-gradient-animated {
        background: linear-gradient(135deg, #06b6d4, #8b5cf6, #06b6d4);
