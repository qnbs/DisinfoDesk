<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect x="4" y="4" width="504" height="504" rx="104" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>
  <!-- Grid lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.4">
    <line x1="128" y1="0" x2="128" y2="512"/><line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/><line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/><line x1="0" y1="384" x2="512" y2="384"/>
  </g>
  <!-- Ambient glow -->
  <ellipse cx="256" cy="220" rx="160" ry="160" fill="url(#glow)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="220" r="120" fill="none" stroke="url(#ring)" stroke-width="10" opacity="0.8"/>
  <!-- Tick marks on ring -->
  <g stroke="#06b6d4" stroke-width="3" opacity="0.6">
    <line x1="256" y1="92" x2="256" y2="108"/><line x1="256" y1="332" x2="256" y2="348"/>
    <line x1="128" y1="220" x2="144" y2="220"/><line x1="368" y1="220" x2="384" y2="220"/>
  </g>
  <!-- Inner ring -->
  <circle cx="256" cy="220" r="70" fill="none" stroke="#06b6d4" stroke-width="4" opacity="0.35" stroke-dasharray="8 6"/>
  <!-- Crosshair -->
  <line x1="220" y1="220" x2="292" y2="220" stroke="#06b6d4" stroke-width="2.5" opacity="0.5"/>
  <line x1="256" y1="184" x2="256" y2="256" stroke="#06b6d4" stroke-width="2.5" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="256" cy="220" r="10" fill="#06b6d4"/>
  <circle cx="256" cy="220" r="5" fill="#fff"/>
  <!-- Globe lock / shield icon in center -->
  <g transform="translate(256,220)" opacity="0">
    <!-- Placeholder: the rings ARE the visual -->
  </g>
  <!-- Bottom text: DD -->
  <text x="256" y="440" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="72" font-weight="800" fill="#e2e8f0" text-anchor="middle" letter-spacing="16">DD</text>
  <!-- Subtitle -->
  <text x="256" y="475" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="600" fill="#06b6d4" text-anchor="middle" letter-spacing="8" opacity="0.8">DISINFODESK</text>
</svg>
