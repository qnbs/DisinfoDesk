name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check out repository source code
      - name: Checkout
        uses: actions/checkout@v5

      # Install current Node.js LTS and enable npm dependency cache
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      # Install dependencies in clean CI mode
      - name: Install dependencies
        run: npm ci

      # Build production assets with Vite
      - name: Build
        run: npm run build

      # Prepare GitHub Pages deployment context
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Upload dist output as deployable pages artifact
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Deploy the uploaded artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
