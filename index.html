        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;

      /* Accessibility: Focus Visible Global */

      /* Accessibility: Reduced Motion */
      @media (prefers-reduced-motion: reduce) {

          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
