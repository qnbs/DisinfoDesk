<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Grid (subtle) -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.3">
    <line x1="170" y1="0" x2="170" y2="512"/><line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="342" y1="0" x2="342" y2="512"/><line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="256" x2="512" y2="256"/><line x1="0" y1="342" x2="512" y2="342"/>
  </g>
  <!-- Glow -->
  <ellipse cx="256" cy="230" rx="120" ry="120" fill="url(#glow)"/>
  <!-- Outer ring (within safe zone ~80% = 204px radius from center) -->
  <circle cx="256" cy="230" r="95" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.9"/>
  <!-- Tick marks -->
  <g stroke="#06b6d4" stroke-width="3" opacity="0.5">
    <line x1="256" y1="128" x2="256" y2="143"/><line x1="256" y1="317" x2="256" y2="332"/>
    <line x1="153" y1="230" x2="168" y2="230"/><line x1="344" y1="230" x2="359" y2="230"/>
  </g>
  <!-- Inner ring -->
  <circle cx="256" cy="230" r="50" fill="none" stroke="#06b6d4" stroke-width="3" opacity="0.3" stroke-dasharray="6 5"/>
  <!-- Center -->
  <circle cx="256" cy="230" r="8" fill="#06b6d4"/>
  <circle cx="256" cy="230" r="4" fill="#fff"/>
  <!-- Text DD -->
  <text x="256" y="405" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="56" font-weight="800" fill="#e2e8f0" text-anchor="middle" letter-spacing="12">DD</text>
</svg>
