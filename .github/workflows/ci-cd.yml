# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  DisinfoDesk CI/CD Pipeline                                                ║
# ║  Lint → Test → Build → Lighthouse → Docker → Deploy (2026 best practices)  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: '22'
  CI: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # CI JOB: Lint, Test, Build, Lighthouse
  # ════════════════════════════════════════════════════════════════════════════
  ci:
    name: CI (Lint, Test, Build, Lighthouse)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint codebase
        run: npm run lint

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run unit tests with coverage
        run: npm run test:ci -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage/
          retention-days: 7

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist
          retention-days: 3

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        continue-on-error: true
        with:
          configPath: ./lighthouserc.json
          budgetPath: ./budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ════════════════════════════════════════════════════════════════════════════
  # DOCKER JOB: Build & Push container image
  # ════════════════════════════════════════════════════════════════════════════
  docker:
    name: Docker Build & Push
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ════════════════════════════════════════════════════════════════════════════
  # DEPLOY JOB: GitHub Pages (main only)
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to GitHub Pages
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
